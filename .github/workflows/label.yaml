name: Label

on:
  pull_request_target:
    types: [opened, edited, synchronize]
  issues:
    types: [opened, edited]

jobs:
  label:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          token:
      - name: conventional-labels
        uses: DonBLong/conventional-labels@main
        with:
          token:
          map: |
            feat: enhancement, feature
            perf: enhancement, performance
            fix: bug, fix
            docs: documentation
          breaking-change: breaking
          sources: commits
          replace: true
