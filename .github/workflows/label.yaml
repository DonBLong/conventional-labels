name: Label

on:
  pull_request_target:
    types: [opened, edited]

jobs:
  label:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: conventional-labels
        uses: ./
        with:
          map: |
            feat: enhancement, feature
            perf: enhancement, performance
            fix: bug, fix
            docs: documentation
